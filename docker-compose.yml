services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: bookdatabase
    ports:
      - "5431:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./bookdatabase.sql:/docker-entrypoint-initdb.d/bookdatabase.sql
    networks:
      - booktrack_network

  backend:
    build: ./backend
    container_name: booktrack_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/bookdatabase
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PREMIUM_PRICE_ID: ${STRIPE_PREMIUM_PRICE_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CHURN_MODEL_NAME: ${CHURN_MODEL_NAME:-random_forest}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-BookTrack Team}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - booktrack_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: booktrack_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://backend:8000

      WATCHPACK_POLLING: "true"
      WATCHPACK_POLL_INTERVAL: "500"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - booktrack_network
    command: npm run dev

volumes:
  pg_data:

networks:
  booktrack_network:
    driver: bridge
