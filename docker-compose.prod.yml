services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bookdatabase
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./bookdatabase.sql:/docker-entrypoint-initdb.d/bookdatabase.sql
    networks:
      - booktrack_network
    restart: always

  backend:
    build: ./Backend
    container_name: booktrack_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bookdatabase
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PREMIUM_PRICE_ID: ${STRIPE_PREMIUM_PRICE_ID:-}
      FRONTEND_URL: http://${PUBLIC_IP}:3000
    depends_on:
      - postgres
    networks:
      - booktrack_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${PUBLIC_IP}:8000
    container_name: booktrack_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://${PUBLIC_IP}:8000
      API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - booktrack_network

volumes:
  pg_data:

networks:
  booktrack_network:
    driver: bridge